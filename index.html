<meta charset="utf-8">
<title>Fakeamon — Battle</title>

<style>
  /* ---- Simple, friendly styling ---- */
  body {
    font-family: system-ui, Arial, sans-serif;
    background: #f4f7fb;
    color: #223;
    margin: 0;
    padding: 24px;
  }
  h1 {
    text-align: center;
    color: #2a4d8f;
  }
  #arena {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 760px;
    margin: 0 auto;
  }
  .fighter {
    background: white;
    border: 3px solid #d0d8e8;
    border-radius: 16px;
    padding: 16px;
    width: 320px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
  }
  .fighter h2 {
    margin: 0 0 4px 0;
  }
  /* The colored "sprite" box — placeholder art for M1 (no sprites yet). */
  .sprite {
    height: 90px;
    border-radius: 12px;
    margin: 8px 0;
  }
  .type-fire  { background: #ff8a5c; }
  .type-water { background: #5ca8ff; }
  .type-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    color: white;
    font-size: 13px;
    text-transform: capitalize;
  }
  .stats {
    font-size: 14px;
    color: #556;
    margin: 8px 0;
  }
  .moves {
    list-style: none;
    padding: 0;
    margin: 8px 0 0 0;
  }
  .moves li {
    background: #eef2fa;
    border-radius: 8px;
    padding: 6px 10px;
    margin-bottom: 6px;
    font-size: 14px;
  }

  /* ---- Step 2: move buttons + battle log ---- */
  .section-label {
    text-align: center;
    color: #556;
    margin: 20px 0 8px;
  }
  #controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 760px;
    margin: 0 auto;
  }
  .move-btn {
    background: #2a4d8f;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 15px;
    cursor: pointer;
  }
  .move-btn:hover {
    background: #1d3868;
  }
  #log {
    max-width: 760px;
    margin: 20px auto 0;
    background: white;
    border: 3px solid #d0d8e8;
    border-radius: 16px;
    padding: 12px 16px;
    height: 140px;
    overflow-y: auto;
    font-size: 14px;
    color: #334;
  }
  #log div {
    padding: 3px 0;
  }

  /* ---- Step 4: HP bar ---- */
  .hp-bar-track {
    background: #e2e8f5;
    border-radius: 999px;
    height: 14px;
    overflow: hidden;
    margin: 8px 0 6px;
  }
  .hp-bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.3s ease, background 0.3s ease;
  }
  @media (prefers-reduced-motion: reduce) {
    .hp-bar-fill {
      transition: none;
    }
  }
</style>

<h1>Fakeamon Battle — Growler vs Whaley</h1>
<div id="arena"></div>

<p class="section-label">Choose Growler's move:</p>
<div id="controls"></div>

<p class="section-label">Battle Log</p>
<div id="log"></div>

<script>
// ===========================================================================
//  GAME VALUES — tweak these freely! (Lewis: change numbers and reload.)
// ===========================================================================

// ---- MOVES ----  Each move: { name, type, power, accuracy(%) }
const MOVES = {
  // Growler's moves
  tackle: { name: "Tackle", type: "normal", power: 8,  accuracy: 100 },
  bite:   { name: "Bite",   type: "normal", power: 10, accuracy: 95  },
  burn:   { name: "Burn",   type: "fire",   power: 12, accuracy: 95  },
  flare:  { name: "Flare",  type: "fire",   power: 18, accuracy: 85  },

  // Whaley's moves
  splash: { name: "Splash", type: "water",  power: 8,  accuracy: 100 },
  spout:  { name: "Spout",  type: "water",  power: 12, accuracy: 95  },
  breech: { name: "Breech", type: "water",  power: 16, accuracy: 90  },
};

// ---- FAKEAMON ----  Each fighter: name, type, stats, and its 4 moves.
const GROWLER = {
  name: "Growler", type: "fire",
  maxHP: 40, attack: 13, defense: 10, speed: 12,
  moves: ["tackle", "bite", "burn", "flare"],
};

const WHALEY = {
  name: "Whaley", type: "water",
  maxHP: 44, attack: 12, defense: 12, speed: 9,
  moves: ["tackle", "splash", "spout", "breech"],
};

// ---- TYPE CHART ----  move type (rows) vs defender's type (columns).
// From DESIGN.md §4: Fire melts Metal and burns Grass; Water douses Fire;
// Grass drinks Water; Metal chops Grass. Normal moves are always neutral.
const TYPE_CHART = {
  fire:   { fire: 1,   water: 0.5, grass: 2,   metal: 2,   normal: 1 },
  water:  { fire: 2,   water: 1,   grass: 0.5, metal: 1,   normal: 1 },
  grass:  { fire: 0.5, water: 2,   grass: 1,   metal: 0.5, normal: 1 },
  metal:  { fire: 0.5, water: 1,   grass: 2,   metal: 1,   normal: 1 },
  normal: { fire: 1,   water: 1,   grass: 1,   metal: 1,   normal: 1 },
};

// ===========================================================================
//  BATTLE STATE
//  Step 3: Whaley's current HP can now go down. (Growler doesn't take damage
//  yet — that arrives in Step 6, when Whaley fights back.)
// ===========================================================================
let whaleyHP = WHALEY.maxHP;

// ===========================================================================
//  SHOW THE FIGHTERS ON SCREEN
// ===========================================================================

// Step 4: pick the HP bar color — green when healthy, yellow when hurt,
// red when in real danger. Easy to retune these thresholds/colors later.
function hpBarColor(percent) {
  if (percent > 50) return "#4bbd6b"; // green
  if (percent > 20) return "#f5c445"; // yellow
  return "#e05252";                   // red
}

function showFighter(fakeamon, currentHP) {
  // Build the list of this Fakeamon's moves as text.
  const moveItems = fakeamon.moves.map(function (moveKey) {
    const move = MOVES[moveKey];
    return "<li>" + move.name +
           " — " + move.type +
           ", power " + move.power +
           ", " + move.accuracy + "% hit</li>";
  }).join("");

  const percent = Math.max(0, Math.min(100, Math.round((currentHP / fakeamon.maxHP) * 100)));

  return (
    '<div class="fighter">' +
      "<h2>" + fakeamon.name + "</h2>" +
      '<span class="type-badge type-' + fakeamon.type + '">' + fakeamon.type + "</span>" +
      '<div class="sprite type-' + fakeamon.type + '"></div>' +
      '<div class="hp-bar-track">' +
        '<div class="hp-bar-fill" style="width: ' + percent + '%; background: ' + hpBarColor(percent) + ';"></div>' +
      "</div>" +
      '<div class="stats">' +
        "HP " + currentHP + "/" + fakeamon.maxHP +
        " &nbsp;•&nbsp; Attack " + fakeamon.attack +
        " &nbsp;•&nbsp; Defense " + fakeamon.defense +
        " &nbsp;•&nbsp; Speed " + fakeamon.speed +
      "</div>" +
      "<strong>Moves</strong>" +
      '<ul class="moves">' + moveItems + "</ul>" +
    "</div>"
  );
}

// Redraw both fighters with their current HP.
function renderArena() {
  document.getElementById("arena").innerHTML =
    showFighter(GROWLER, GROWLER.maxHP) + showFighter(WHALEY, whaleyHP);
}

renderArena();

// ===========================================================================
//  DAMAGE FORMULA — full version from DESIGN.md §6:
//    raw    = move power + attacker's Attack − defender's Defense (min 1)
//    damage = round(raw × typeMultiplier × random(0.85–1.15))
//  Returns both the damage and the type multiplier, so the battle log can
//  say "super effective" or "not very effective" when it matters.
// ===========================================================================
function calculateDamage(move, attacker, defender) {
  const raw = Math.max(1, move.power + attacker.attack - defender.defense);
  const typeMultiplier = TYPE_CHART[move.type][defender.type];
  const wiggle = 0.85 + Math.random() * 0.30; // a random number from 0.85 to 1.15
  const damage = Math.round(raw * typeMultiplier * wiggle);

  return { damage: damage, typeMultiplier: typeMultiplier };
}

// ===========================================================================
//  BATTLE LOG — a running list of what's happened so far.
// ===========================================================================
const logLines = [];

function addLogLine(text) {
  logLines.push(text);
  const logBox = document.getElementById("log");
  logBox.innerHTML = logLines.map(function (line) {
    return "<div>" + line + "</div>";
  }).join("");
  logBox.scrollTop = logBox.scrollHeight; // keep the newest line in view
}

// ===========================================================================
//  MOVE BUTTONS
//  Step 3: clicking a button now deals real damage to Whaley.
// ===========================================================================
function showMoveButtons(fakeamon) {
  const controls = document.getElementById("controls");
  controls.innerHTML = ""; // clear any old buttons first

  fakeamon.moves.forEach(function (moveKey) {
    const move = MOVES[moveKey];
    const button = document.createElement("button");
    button.className = "move-btn";
    button.textContent = move.name;
    button.addEventListener("click", function () {
      const result = calculateDamage(move, fakeamon, WHALEY);
      whaleyHP = Math.max(0, whaleyHP - result.damage);

      let line = fakeamon.name + " used " + move.name + "! It dealt " + result.damage + " damage.";
      if (result.typeMultiplier >= 2) {
        line += " It's super effective!";
      } else if (result.typeMultiplier <= 0.5) {
        line += " It's not very effective...";
      }
      addLogLine(line);
      renderArena();
    });
    controls.appendChild(button);
  });
}

showMoveButtons(GROWLER);
addLogLine("A wild " + WHALEY.name + " appears! Choose a move for " + GROWLER.name + ".");
</script>
