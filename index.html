<meta charset="utf-8">
<!-- M3 Step S10: without this, phones render the page at a ~980px virtual
     width and force a pinch-zoom. PLANS/M3_TOUCH_AND_MOBILE_PLAN.md §5.1. -->
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Offline play (added 2026-07-12): the manifest is what makes "Add to
     Home Screen" on Android install a real app icon instead of a bookmark.
     The actual offline caching is service-worker.js, registered from
     src/main.js. See its header comment before changing any asset paths. -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#2a4d8f">
<link rel="icon" href="assets/icons/icon-192.png">
<title>Fakeamon</title>

<style>
  /* ---- Simple, friendly styling ---- */
  body {
    font-family: system-ui, Arial, sans-serif;
    background: #f4f7fb;
    color: #223;
    margin: 0;
    padding: 24px;
  }
  h1 {
    text-align: center;
    color: #2a4d8f;
  }
  #arena {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 760px;
    margin: 0 auto;
  }
  .fighter {
    background: white;
    border: 3px solid #d0d8e8;
    border-radius: 16px;
    padding: 16px;
    width: 320px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
  }
  .fighter h2 {
    margin: 0 0 4px 0;
  }
  /* Step 2: the starter-select screen — a fighter card + a choose button */
  .starter-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  /* The colored box is now a "stage" behind the real Tuxemon-based art,
     so the type color is still visible at a glance. */
  .sprite {
    height: 120px;
    border-radius: 12px;
    margin: 8px 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sprite img {
    height: 100%;
    width: auto;
    image-rendering: pixelated; /* keep pixel art crisp, no blur */
  }
  .type-fire  { background: #ff8a5c; }
  .type-water { background: #5ca8ff; }
  .type-grass { background: #6cc24a; }
  /* CR-C fix (M4): The Meadows roster has normal-type creatures, and Gym 1 is
     metal — without a color their type "stage" and badge were invisible (white
     text on white). Cosmic is Artemis's type (M5), added now so it's ready.
     Tweak these colors freely. */
  .type-normal { background: #b3a878; } /* warm tan */
  .type-metal  { background: #8fa3b8; } /* steely blue-grey */
  .type-cosmic { background: #8f79d6; } /* deep periwinkle */
  .type-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    color: white;
    font-size: 13px;
    text-transform: capitalize;
  }
  .stats {
    font-size: 14px;
    color: #556;
    margin: 8px 0;
  }
  .moves {
    list-style: none;
    padding: 0;
    margin: 8px 0 0 0;
  }
  .moves li {
    background: #eef2fa;
    border-radius: 8px;
    padding: 6px 10px;
    margin-bottom: 6px;
    font-size: 14px;
  }

  /* ---- Step 2: move buttons + battle log ---- */
  .section-label {
    text-align: center;
    color: #556;
    margin: 20px 0 8px;
  }
  #controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 760px;
    margin: 0 auto;
  }
  .move-btn {
    background: #2a4d8f;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 15px;
    cursor: pointer;
  }
  .move-btn:hover {
    background: #1d3868;
  }
  .move-btn:disabled {
    background: #a7b4cf;
    cursor: not-allowed;
  }
  /* Step 3: Run sits apart from the moves so it doesn't look like an attack */
  .run-btn {
    background: #8a94a6;
  }
  .run-btn:hover {
    background: #6f7789;
  }
  /* Step 4: Throw Fakeaball gets its own color too, between attack and Run */
  .catch-btn {
    background: #d9534f;
  }
  .catch-btn:hover {
    background: #b83f3c;
  }
  /* M4: the real Fakeaball icon (Tuxemon's "Tuxeball Earth", CREDITS.md) on
     the catch button, instead of just text. */
  .ball-icon {
    height: 18px;
    width: auto;
    vertical-align: middle;
    margin-right: 6px;
    image-rendering: pixelated;
  }
  /* Step 6: the in-battle Switch button (and its "who to switch to"
     picker) get a teal accent — a genuine .move-btn on purpose, since
     using it correctly costs a turn like an attack does. */
  .switch-btn {
    background: #2ea8a8;
  }
  .switch-btn:hover {
    background: #22807f;
  }
  .result-message {
    width: 100%;
    text-align: center;
    font-size: 19px;
    font-weight: bold;
    margin: 0 0 12px;
  }
  #log {
    max-width: 760px;
    margin: 20px auto 0;
    background: white;
    border: 3px solid #d0d8e8;
    border-radius: 16px;
    padding: 12px 16px;
    height: 140px;
    overflow-y: auto;
    font-size: 14px;
    color: #334;
  }
  #log div {
    padding: 3px 0;
  }

  /* ---- Step 4: HP bar ---- */
  .hp-bar-track {
    background: #e2e8f5;
    border-radius: 999px;
    height: 14px;
    overflow: hidden;
    margin: 8px 0 6px;
  }
  .hp-bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.3s ease, background 0.3s ease;
  }
  @media (prefers-reduced-motion: reduce) {
    .hp-bar-fill {
      transition: none;
    }
  }

  /* ---- Step 5: team list + Boxes ---- */
  .team-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    max-width: 760px;
    margin: 20px auto 0;
  }
  /* Deliberately NOT .move-btn: that class gets mass-disabled mid-turn by
     setControlsEnabled() in battle.js, which would also lock out Boxes. */
  .boxes-btn {
    background: #2a4d8f;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  .boxes-btn:hover {
    background: #1d3868;
  }
  /* M4S1: the token counter chip, sat in the team header between "Your Team"
     and the Boxes button. Goldenrod so it reads as coins at a glance. */
  .token-count {
    font-weight: bold;
    color: #b8860b;
    font-size: 15px;
    white-space: nowrap;
  }
  #team, #boxes {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 760px;
    margin: 10px auto 0;
  }
  #boxes {
    display: none; /* toggled open by the Boxes button */
  }
  #boxes.visible {
    display: flex;
  }
  #boxes p {
    color: #778;
    font-size: 14px;
  }
  .team-card {
    background: white;
    border: 2px solid #d0d8e8;
    border-radius: 12px;
    padding: 10px;
    width: 130px;
    text-align: center;
    font-size: 13px;
  }
  .team-card.active-card {
    border-color: #2a4d8f;
    box-shadow: 0 0 0 2px rgba(42, 77, 143, 0.25);
  }
  .team-sprite {
    height: 60px;
  }
  .team-hp-text {
    font-size: 12px;
    color: #556;
  }
  /* Step 8: a running XP count, so it's visible that it's really banking up
     even though nothing levels up yet (that's M5's job). */
  .team-xp-text {
    font-size: 12px;
    color: #7a5cb0;
  }
  /* Step 6: Switch buttons. Deliberately NOT .move-btn — same reason as
     .boxes-btn above (battle.js's setControlsEnabled() would grab it). */
  .team-switch-btn {
    margin-top: 8px;
    background: #4bbd6b;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .team-switch-btn:hover {
    background: #3aa058;
  }
  .team-switch-btn:disabled {
    background: #bcdcc4;
    cursor: not-allowed;
  }

  /* One shared "hide me" switch. The screen manager (src/screens.js) toggles
     this on #world to swap between the map and a battle (M3 S7). */
  .hidden { display: none !important; }

  /* ---- M3 Step S1: the overworld (Phaser canvas) ---- */
  /* #world is where Phaser drops its <canvas>. We just center it and give it
     the same friendly rounded border as the fighter cards. */
  #world {
    display: flex;
    justify-content: center;
    margin: 8px auto 0;
    position: relative; /* M3 S10: lets #dpad + #dpadToggle overlay the canvas */
    /* M3 S10: Phaser's FIT scale mode needs a parent with a BOUNDED size to
       fit into — without this, #world had no explicit height and Phaser
       fell back to the full window height, which threw off its own
       canvas-centering math (and our overlay). width/aspect-ratio give it
       one, capped at the same 960x640 desktop max as before. */
    width: 100%;
    max-width: 960px;
    aspect-ratio: 480 / 320;
  }
  #world canvas {
    border: 3px solid #d0d8e8;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    image-rendering: pixelated; /* keep the pixel art crisp when scaled up */
  }

  /* ---- "Pocket Venta" — the on-screen D-pad (M3 Step S10) ----
     PLANS/M3_TOUCH_AND_MOBILE_PLAN.md §4. Four separate floating arrows
     (not one solid cross — Lewis's B38), bottom-right (B39), half
     see-through (B40) so the meadow underneath still shows through. Hidden
     unless .visible (the toggle, B41) AND not .battle-hidden (src/screens.js,
     §6 — a thumb resting on the pad can't walk the hidden hero mid-battle). */
  #dpad {
    display: none;
    position: absolute;
    right: 10px;
    bottom: 10px;
    grid-template-columns: 52px 52px 52px;
    grid-template-rows: 52px 52px 52px;
    gap: 6px;
    touch-action: none;   /* stop the browser's own scroll/zoom gestures here */
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #dpad.visible:not(.battle-hidden) {
    display: grid;
  }
  #dpad button {
    width: 100%;
    height: 100%;
    border: none;
    border-radius: 10px;
    background: #2a4d8f;
    color: white;
    font-size: 22px;
    opacity: 0.5; /* half see-through — B40 */
    touch-action: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
  }
  #dpad button:active {
    opacity: 0.8;
  }
  #dpad-up    { grid-column: 2; grid-row: 1; }
  #dpad-left  { grid-column: 1; grid-row: 2; }
  #dpad-right { grid-column: 3; grid-row: 2; }
  #dpad-down  { grid-column: 2; grid-row: 3; }
  /* Center cell (col 2, row 2) stays empty on purpose — reserved for a
     future A button once M4's NPCs/doors need a "talk" action (plan §4). */

  #dpadToggle {
    position: absolute;
    top: 8px;
    right: 8px;
    background: #2a4d8f;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    opacity: 0.7;
    cursor: pointer;
  }

  /* ---- Save v1 (M5-plan S3/S4): title screen + save settings ---- */
  .title-card {
    background: white;
    border: 3px solid #d0d8e8;
    border-radius: 16px;
    padding: 24px;
    max-width: 420px;
    margin: 0 auto;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
  }
  .title-card h2 {
    margin: 0 0 8px;
    color: #2a4d8f;
    font-size: 28px;
  }
  .title-card p {
    color: #556;
    margin: 0;
  }
  /* Export / Import buttons — the "settings corner" of the title screen.
     Styled smaller/greyer so they read as secondary to Continue/New Game.
     They live in #controls with the others, so switching screens clears them. */
  .save-btn {
    background: #6b7a99;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  .save-btn:hover {
    background: #566484;
  }
</style>

<h1 id="title">Fakeamon</h1>

<!-- M3 Step S1: the OVERWORLD. Phaser draws its canvas in here. Right now
     it's just an empty grass-green screen — proof Phaser is wired in. The
     real meadow map arrives at Step S2. (PLANS/M3_OVERWORLD_PLAN.md §1) -->
<div id="world">
  <!-- "Pocket Venta" (M3 Step S10) — a touch D-pad overlaid on the map
       canvas, plus its show/hide toggle (B41). Plain DOM, wired in
       src/world/dpad.js; Phaser never touches these buttons directly
       (PLANS/M3_TOUCH_AND_MOBILE_PLAN.md §4). -->
  <div id="dpad">
    <button id="dpad-up" type="button" aria-label="Walk up">▲</button>
    <button id="dpad-left" type="button" aria-label="Walk left">◀</button>
    <button id="dpad-right" type="button" aria-label="Walk right">▶</button>
    <button id="dpad-down" type="button" aria-label="Walk down">▼</button>
  </div>
  <button id="dpadToggle" type="button">🕹️ Show pad</button>
</div>

<!-- The BATTLE room — the plain-HTML fight screen from M1/M2, unchanged.
     Wrapped in one #battle box so a later step can show/hide it as a unit
     when we jump between the map and a battle (M3 plan §3). -->
<div id="battle">
  <div id="arena"></div>

  <p class="section-label" id="controls-label">Choose your starter:</p>
  <div id="controls"></div>

  <p class="section-label">Battle Log</p>
  <div id="log"></div>

  <div class="team-header">
    <p class="section-label">Your Team</p>
    <!-- M4S1: the token counter — the currency you earn from battles. In the
         team header so it shows on both the map and the battle screen. -->
    <span id="tokens" class="token-count">🪙 0</span>
    <button id="boxesBtn" class="boxes-btn">Boxes (0)</button>
  </div>
  <div id="team"></div>
  <div id="boxes"></div>
</div>

<!-- Phaser (the game engine for the overworld) — M3 Step S1. Vendored, not
     loaded from a CDN, so double-clicking index.html still works offline and
     nothing can swap the file out from under us (M3 plan §2; DECISIONS.md).
     Pinned to Phaser 4.2.1 — see assets/vendor/phaser-LICENSE.md. This must
     load BEFORE src/world/config.js, which uses the global Phaser it defines. -->
<script src="assets/vendor/phaser.min.js"></script>

<!-- Game code lives in src/ now. Plain scripts (not modules) on purpose, so
     double-clicking index.html still works with no server needed — which
     means load ORDER is how files depend on each other. Required order:
       data/*  →  state.js  →  battle.js  →  save.js  →  world/config.js
       →  screens.js  →  main.js
     (save.js reads gameState + uses battle.js's addLogLine; world/config.js
     needs the Phaser global above; screens.js swaps the map/battle screens and
     uses config.js's worldScene/worldGame; main.js starts both the overworld
     and the battle game and calls the screen manager, so it goes last.
     progression.js will slot in between state.js and battle.js once M5's
     leveling work lands — see PLANS/M5_STATE_AND_SAVE_PLAN.md §A.1.) -->
<script src="src/data/moves.js"></script>
<script src="src/data/fakeamon.js"></script>
<script src="src/data/typechart.js"></script>
<script src="src/data/economy.js"></script>
<script src="src/data/maps.js"></script>
<script src="src/state.js"></script>
<script src="src/battle.js"></script>
<script src="src/save.js"></script>
<script src="src/world/config.js"></script>
<script src="src/world/dpad.js"></script>
<script src="src/screens.js"></script>
<script src="src/main.js"></script>
