<meta charset="utf-8">
<title>Fakeamon — Battle</title>

<style>
  /* ---- Simple, friendly styling ---- */
  body {
    font-family: system-ui, Arial, sans-serif;
    background: #f4f7fb;
    color: #223;
    margin: 0;
    padding: 24px;
  }
  h1 {
    text-align: center;
    color: #2a4d8f;
  }
  #arena {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 760px;
    margin: 0 auto;
  }
  .fighter {
    background: white;
    border: 3px solid #d0d8e8;
    border-radius: 16px;
    padding: 16px;
    width: 320px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
  }
  .fighter h2 {
    margin: 0 0 4px 0;
  }
  /* The colored "sprite" box — placeholder art for M1 (no sprites yet). */
  .sprite {
    height: 90px;
    border-radius: 12px;
    margin: 8px 0;
  }
  .type-fire  { background: #ff8a5c; }
  .type-water { background: #5ca8ff; }
  .type-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    color: white;
    font-size: 13px;
    text-transform: capitalize;
  }
  .stats {
    font-size: 14px;
    color: #556;
    margin: 8px 0;
  }
  .moves {
    list-style: none;
    padding: 0;
    margin: 8px 0 0 0;
  }
  .moves li {
    background: #eef2fa;
    border-radius: 8px;
    padding: 6px 10px;
    margin-bottom: 6px;
    font-size: 14px;
  }
</style>

<h1>Fakeamon Battle — Growler vs Whaley</h1>
<div id="arena"></div>

<script>
// ===========================================================================
//  GAME VALUES — tweak these freely! (Lewis: change numbers and reload.)
// ===========================================================================

// ---- MOVES ----  Each move: { name, type, power, accuracy(%) }
const MOVES = {
  // Growler's moves
  tackle: { name: "Tackle", type: "normal", power: 8,  accuracy: 100 },
  bite:   { name: "Bite",   type: "normal", power: 10, accuracy: 95  },
  burn:   { name: "Burn",   type: "fire",   power: 12, accuracy: 95  },
  flare:  { name: "Flare",  type: "fire",   power: 18, accuracy: 85  },

  // Whaley's moves
  splash: { name: "Splash", type: "water",  power: 8,  accuracy: 100 },
  spout:  { name: "Spout",  type: "water",  power: 12, accuracy: 95  },
  breech: { name: "Breech", type: "water",  power: 16, accuracy: 90  },
};

// ---- FAKEAMON ----  Each fighter: name, type, stats, and its 4 moves.
const GROWLER = {
  name: "Growler", type: "fire",
  maxHP: 40, attack: 13, defense: 10, speed: 12,
  moves: ["tackle", "bite", "burn", "flare"],
};

const WHALEY = {
  name: "Whaley", type: "water",
  maxHP: 44, attack: 12, defense: 12, speed: 9,
  moves: ["tackle", "splash", "spout", "breech"],
};

// ===========================================================================
//  SHOW THE FIGHTERS ON SCREEN
//  (Step 1: just display them so we can see our data is right.
//   Battle buttons and damage come in the next step.)
// ===========================================================================

function showFighter(fakeamon) {
  // Build the list of this Fakeamon's moves as text.
  const moveItems = fakeamon.moves.map(function (moveKey) {
    const move = MOVES[moveKey];
    return "<li>" + move.name +
           " — " + move.type +
           ", power " + move.power +
           ", " + move.accuracy + "% hit</li>";
  }).join("");

  return (
    '<div class="fighter">' +
      "<h2>" + fakeamon.name + "</h2>" +
      '<span class="type-badge type-' + fakeamon.type + '">' + fakeamon.type + "</span>" +
      '<div class="sprite type-' + fakeamon.type + '"></div>' +
      '<div class="stats">' +
        "HP " + fakeamon.maxHP +
        " &nbsp;•&nbsp; Attack " + fakeamon.attack +
        " &nbsp;•&nbsp; Defense " + fakeamon.defense +
        " &nbsp;•&nbsp; Speed " + fakeamon.speed +
      "</div>" +
      "<strong>Moves</strong>" +
      '<ul class="moves">' + moveItems + "</ul>" +
    "</div>"
  );
}

// Put both fighters into the arena.
document.getElementById("arena").innerHTML =
  showFighter(GROWLER) + showFighter(WHALEY);
</script>
