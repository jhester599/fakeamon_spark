<meta charset="utf-8">
<title>Fakeamon — Battle</title>

<style>
  /* ---- Simple, friendly styling ---- */
  body {
    font-family: system-ui, Arial, sans-serif;
    background: #f4f7fb;
    color: #223;
    margin: 0;
    padding: 24px;
  }
  h1 {
    text-align: center;
    color: #2a4d8f;
  }
  #arena {
    display: flex;
    gap: 24px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 760px;
    margin: 0 auto;
  }
  .fighter {
    background: white;
    border: 3px solid #d0d8e8;
    border-radius: 16px;
    padding: 16px;
    width: 320px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
  }
  .fighter h2 {
    margin: 0 0 4px 0;
  }
  /* Step 2: the starter-select screen — a fighter card + a choose button */
  .starter-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  /* The colored box is now a "stage" behind the real Tuxemon-based art,
     so the type color is still visible at a glance. */
  .sprite {
    height: 120px;
    border-radius: 12px;
    margin: 8px 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sprite img {
    height: 100%;
    width: auto;
    image-rendering: pixelated; /* keep pixel art crisp, no blur */
  }
  .type-fire  { background: #ff8a5c; }
  .type-water { background: #5ca8ff; }
  .type-grass { background: #6cc24a; }
  .type-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    color: white;
    font-size: 13px;
    text-transform: capitalize;
  }
  .stats {
    font-size: 14px;
    color: #556;
    margin: 8px 0;
  }
  .moves {
    list-style: none;
    padding: 0;
    margin: 8px 0 0 0;
  }
  .moves li {
    background: #eef2fa;
    border-radius: 8px;
    padding: 6px 10px;
    margin-bottom: 6px;
    font-size: 14px;
  }

  /* ---- Step 2: move buttons + battle log ---- */
  .section-label {
    text-align: center;
    color: #556;
    margin: 20px 0 8px;
  }
  #controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 760px;
    margin: 0 auto;
  }
  .move-btn {
    background: #2a4d8f;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 15px;
    cursor: pointer;
  }
  .move-btn:hover {
    background: #1d3868;
  }
  .move-btn:disabled {
    background: #a7b4cf;
    cursor: not-allowed;
  }
  /* Step 3: Run sits apart from the moves so it doesn't look like an attack */
  .run-btn {
    background: #8a94a6;
  }
  .run-btn:hover {
    background: #6f7789;
  }
  /* Step 4: Throw Fakeaball gets its own color too, between attack and Run */
  .catch-btn {
    background: #d9534f;
  }
  .catch-btn:hover {
    background: #b83f3c;
  }
  .result-message {
    width: 100%;
    text-align: center;
    font-size: 19px;
    font-weight: bold;
    margin: 0 0 12px;
  }
  #log {
    max-width: 760px;
    margin: 20px auto 0;
    background: white;
    border: 3px solid #d0d8e8;
    border-radius: 16px;
    padding: 12px 16px;
    height: 140px;
    overflow-y: auto;
    font-size: 14px;
    color: #334;
  }
  #log div {
    padding: 3px 0;
  }

  /* ---- Step 4: HP bar ---- */
  .hp-bar-track {
    background: #e2e8f5;
    border-radius: 999px;
    height: 14px;
    overflow: hidden;
    margin: 8px 0 6px;
  }
  .hp-bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.3s ease, background 0.3s ease;
  }
  @media (prefers-reduced-motion: reduce) {
    .hp-bar-fill {
      transition: none;
    }
  }
</style>

<h1 id="title">Fakeamon Battle</h1>
<div id="arena"></div>

<p class="section-label" id="controls-label">Choose your starter:</p>
<div id="controls"></div>

<p class="section-label">Battle Log</p>
<div id="log"></div>

<!-- Game code lives in src/ now. Plain scripts (not modules) on purpose, so
     double-clicking index.html still works with no server needed — which
     means load ORDER is how files depend on each other. Required order:
       data/*  →  state.js  →  battle.js  →  main.js
     (progression.js will slot in between state.js and battle.js once M5's
     leveling/save work lands — see PLANS/M5_STATE_AND_SAVE_PLAN.md §A.1.) -->
<script src="src/data/moves.js"></script>
<script src="src/data/fakeamon.js"></script>
<script src="src/data/typechart.js"></script>
<script src="src/state.js"></script>
<script src="src/battle.js"></script>
<script src="src/main.js"></script>
